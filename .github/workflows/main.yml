name: Build Android APK (Updated)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Zip file check aur extract karna
    - name: Unzip Project File
      run: |
        echo "=== ZIP FILE KI SEACHING CHAL RAHI HAI ==="
        ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
        if [ -z "$ZIP_FILE" ]; then
          echo "ERROR: Aapki uploaded zip file nahi mili!"
          ls -la
          exit 1
        fi
        echo "Found ZIP: $ZIP_FILE. Extracting now..."
        unzip -q "$ZIP_FILE" -d extracted_project
        echo "=== EXTRACTED FILES LIST ==="
        cd extracted_project && ls -R | head -n 50

    # 2. Java environment setup (Is baar hum Java 11 use kar rahe hain jo sabhi apps ko support karta hai)
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    # 3. Gradlew permission aur build script execution
    - name: Run Android Build
      run: |
        cd extracted_project
        GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
        if [ -z "$GRADLEW_PATH" ]; then
          echo "ERROR: gradlew file pure project me kahi nahi mili!"
          exit 1
        fi
        cd $(dirname "$GRADLEW_PATH")
        chmod +x gradlew
        echo "=== STARTING GRADLE BUILD ==="
        ./gradlew assembleDebug --stacktrace

    # 4. APK file ko download ke liye save karna
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: PayHook-App-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
