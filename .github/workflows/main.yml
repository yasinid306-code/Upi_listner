name: Build Android APK From Zip

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Is baar hum automatically koi bhi .zip file dhoond kar extract karenge
    # Taaki naam ki koi galti na ho
    - name: Unzip Android Project
      run: |
        echo "Searching for zip files..."
        ls -la
        ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
        if [ -z "$ZIP_FILE" ]; then
          echo "Error: Koi bhi .zip file nahi mili repository me!"
          exit 1
        fi
        echo "Extracting: $ZIP_FILE"
        unzip -o "$ZIP_FILE"
        echo "Extraction completed. Current files:"
        ls -la

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: |
        find . -name "gradlew" -exec chmod +x {} \;

    - name: Build with Gradle
      run: |
        GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
        if [ -z "$GRADLEW_PATH" ]; then
          echo "Error: gradlew file nahi mili project me! Zip ke andar project sahi se check karein."
          exit 1
        fi
        cd $(dirname "$GRADLEW_PATH")
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: "**/build/outputs/apk/debug/*.apk"
